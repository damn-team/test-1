<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Portal</title>

    <style>
        body { font-family: Arial; margin: 0; }
        header { background: #222; color: white; padding: 15px; }
        .container { padding: 20px; }
        input { padding: 8px; }
        button { padding: 8px; cursor: pointer; }
        .card { margin-top: 20px; padding: 15px; background: #f2f2f2; }
    </style>
</head>

<body>

<header>
    <h2>KLE Student Portal</h2>
</header>

<div class="container">

    <h3>Search Students</h3>

    <!-- ❌ VULNERABLE INPUT -->
    <input type="text" id="searchBox" placeholder="Enter name">
    <button onclick="search()">Search</button>

    <div id="result" class="card"></div>

</div>

<script>

    function search() {
        const input = document.getElementById("searchBox").value;

        // ❌ REAL XSS VULNERABILITY
        document.getElementById("result").innerHTML =
            "<h4>Results for: " + input + "</h4>";
    }

</script>

</body>
</html>
